name: lotus_test
services:
  lotus:
    container_name: lotus_test
    build:
      context: ./docker
      dockerfile: dockerfile
      args:
        USERNAME: iw
        USER_UID: "1000"
        USER_GID: "1000"
    image: lotus_test:latest
    runtime: nvidia
    user: "1000:1000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,display
      # MuJoCo / robosuite EGL 렌더링
      - MUJOCO_GL=egl
      - PYOPENGL_PLATFORM=egl
      - MUJOCO_EGL_DEVICE_ID=0
      # HuggingFace 다운로드 시 인증이 필요하면 아래 주석 해제 후 토큰 입력
      # - HUGGING_FACE_HUB_TOKEN=hf_xxxxxxxxxxxxxxxxxxxx
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # 소스 코드 마운트 (실시간 개발용)
      - ${HOME}/code/lotus_test:/home/iw/lotus_test
      # LIBERO / 데이터셋 캐시 (컨테이너 진입 후 ~/LIBERO 등에 clone 하면 호스트에 보존됨)
      - ${HOME}/.cache/huggingface:/home/iw/.cache/huggingface
      - ${HOME}/.cache/torch:/home/iw/.cache/torch
    working_dir: /home/iw/lotus_test
    shm_size: "8gb"
    stdin_open: true
    tty: true
    command: /bin/bash
